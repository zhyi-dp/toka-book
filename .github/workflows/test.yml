name: Test Snippets

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test-snippets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Book
        uses: actions/checkout@v4

      - name: Install Toka
        run: curl -fsSL https://tokalang.dev/install.sh | bash

      - name: Test Book Snippets
        run: |
          export PATH="$HOME/.toka/bin:$PATH"
          export TOKA_LIB="$HOME/.toka/lib"
          python3 scripts/test_book.py
