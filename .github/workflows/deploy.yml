name: Deploy Book

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test-examples:
    runs-on: ubuntu-latest
    # tokac is required for compilation tests
    # The Toka toolchain must be installed on the runner
    if: false  # Disabled until Toka toolchain is available on CI
    steps:
      - uses: actions/checkout@v4
      - name: Compile all examples
        run: |
          chmod +x examples/test_examples.sh
          bash examples/test_examples.sh

  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: 'latest'

      - name: Build Book
        run: mdbook build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./book
